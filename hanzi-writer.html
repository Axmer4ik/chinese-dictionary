<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Китайский писатель - Hanzi Writer Инлайн</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      position: relative;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 500;
      color: #2d3748;
      margin-bottom: 30px;
      letter-spacing: -0.3px;
    }
    
    /* Переключатель пиньиня */
    .toggle-wrapper {
      position: absolute;
      top: 40px;
      right: 40px;
    }
    
    .toggle-pinyin {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f1f5f9;
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      font-weight: 500;
      color: #475569;
    }
    
    .toggle-pinyin:hover {
      background: #e2e8f0;
    }
    
    .toggle-switch {
      width: 44px;
      height: 24px;
      background: #cbd5e1;
      border-radius: 30px;
      position: relative;
      transition: all 0.2s;
    }
    
    .toggle-switch.active {
      background: #48bb78;
    }
    
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 3px;
      transition: all 0.2s;
    }
    
    .toggle-switch.active::after {
      left: 21px;
    }
    
    /* Редактируемая строка */
    .editor-line {
        background: #fafcff;
        border: 2px solid #e2e8f0;
        border-radius: 24px;
        padding: 20px 24px;
        min-height: 120px;
        transition: all 0.2s;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;  /* Убираем gap между элементами */
        line-height: 0;
    }

    .editor-line > * {
    margin-right: 2px;
    }

    .editor-line > *:last-child {
        margin-right: 0;
    }
    
    .editor-line:focus-within {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    /* Стили для обычного текста */
    .plain-text {
      display: inline-block;
      font-size: 48px;  /* Такой же размер как у иероглифов */
      line-height: 1;
      color: #1e293b;
      vertical-align: middle;
      margin: 0;
      padding: 0;
  }

    /* Стили для кликабельных иероглифов */
    .char-container {
      display: inline-block;
      position: relative;
      cursor: pointer;
      vertical-align: middle;
      margin: 0;
      padding: 0;
      line-height: 0;
  }

    .hw-target {
        width: 70px;
        height: 70px;
        position: relative;
        display: block;
        line-height: 0;
}
    
    /* Пиньинь - абсолютное позиционирование, не влияет на layout */
    .char-pinyin {
        position: absolute;
        bottom: -18px;  /* Поднимаем выше (было -22px) */
        left: 50%;
        transform: translateX(-50%);
        font-size: 20px;  /* Увеличиваем размер (было 11px) */
        font-weight: 500;
        color: #e67e22;
        background: transparent;  /* Убираем фон */
        padding: 2px 4px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 5;
        line-height: 1.2;
        text-shadow: none;  /* Убираем тень если была */
        border: none;  /* Убираем обводку */
    }
    
    .char-pinyin.hidden {
      display: none;
    }
    
    /* Поле ввода в строке */
    .inline-input {
        display: inline-block;
        min-width: 80px;
        background: transparent;
        border: none;
        font-size: 48px;  /* Такой же размер как у иероглифов */
        font-family: 'Noto Sans CJK SC', 'PingFang SC', 'Segoe UI', system-ui;
        color: #1e293b;
        outline: none;
        padding: 0;
        margin: 0;
        line-height: 1;
        vertical-align: middle;
        caret-color: #667eea;
    }
    
    .inline-input:focus {
      outline: none;
    }
    
    .inline-input::placeholder {
        font-size: 16px;
        color: #cbd5e1;
        line-height: 1;
    }
    
    /* Информационная панель */
    .info-panel {
      background: #f1f5f9;
      border-radius: 24px;
      padding: 24px;
      margin-top: 32px;
    }
    
    .full-pinyin {
      font-size: 18px;
      color: #e67e22;
      font-weight: 500;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #cbd5e1;
      word-break: break-all;
      line-height: 1.5;
    }
    
    .translation {
      font-size: 20px;
      color: #1e293b;
      font-weight: 500;
      line-height: 1.4;
    }
    
    /* Аудио панель */
    .audio-bar {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .audio-btn {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #475569;
    }
    
    .audio-btn:hover:not(:disabled) {
      background: #667eea;
      border-color: #667eea;
      color: white;
      transform: translateY(-1px);
    }
    
    .audio-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .clear-btn {
      background: #fee2e2;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 12px;
      color: #dc2626;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .clear-btn:hover {
      background: #fecaca;
      transform: translateY(-1px);
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #667eea;
      background: #eef2ff;
      padding: 6px 14px;
      border-radius: 30px;
      margin-top: 16px;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #cbd5e1;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 640px) {
        .plain-text {
            font-size: 38px;
        }
        .inline-input {
            font-size: 38px;
            min-width: 60px;
        }
        .hw-target {
            width: 55px;
            height: 55px;
        }
        .editor-line {
            padding: 15px 20px;
        }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✍️ Китайский писатель</h1>
  
  <div class="toggle-wrapper">
    <div class="toggle-pinyin" id="togglePinyinBtn">
      <span>拼音 Pinyin</span>
      <div class="toggle-switch active" id="pinyinToggle"></div>
    </div>
  </div>
  
  <!-- Редактируемая строка -->
  <div class="editor-line" id="editorLine">
    <input type="text" class="inline-input" id="inlineInput">
  </div>
  
  <button class="clear-btn" id="clearBtn">🗑️ Очистить всё</button>
  
  <!-- Информационная панель -->
  <div class="info-panel" id="infoPanel" style="display: none;">
    <div class="translation" id="fullTranslation"></div>
  </div>
  
  <!-- Аудио кнопки -->
  <div class="audio-bar" id="audioBar" style="display: none;">
    <button class="audio-btn" id="speakBtn" disabled>🔊 Озвучить</button>
    <button class="audio-btn" id="speakSlowBtn" disabled>🐢 Медленно</button>
    <button class="audio-btn" id="stopBtn" disabled>⏹️ Стоп</button>
  </div>
  
  <div id="statusMessage" class="status-badge">
    <div class="spinner"></div> Загрузка словаря...
  </div>
</div>

<script>
  // Подключаем HanziWriter
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js';
  document.head.appendChild(script);
  
  // ========== ПРЕОБРАЗОВАНИЕ ТОНОВ ==========
  class PinyinConverter {
    constructor() {
      this.toneMarks = {
        'a1': 'ā', 'a2': 'á', 'a3': 'ǎ', 'a4': 'à',
        'e1': 'ē', 'e2': 'é', 'e3': 'ě', 'e4': 'è',
        'i1': 'ī', 'i2': 'í', 'i3': 'ǐ', 'i4': 'ì',
        'o1': 'ō', 'o2': 'ó', 'o3': 'ǒ', 'o4': 'ò',
        'u1': 'ū', 'u2': 'ú', 'u3': 'ǔ', 'u4': 'ù',
        'ü1': 'ǖ', 'ü2': 'ǘ', 'ü3': 'ǚ', 'ü4': 'ǜ',
        'v1': 'ǖ', 'v2': 'ǘ', 'v3': 'ǚ', 'v4': 'ǜ'
      };
    }
  
    convertSyllable(syllable) {
      const isCapitalized = /^[A-Z]/.test(syllable);
      let lowerSyllable = syllable.toLowerCase();
      const toneMatch = lowerSyllable.match(/([1-5])$/);
      if (!toneMatch) return syllable;
      
      const tone = toneMatch[1];
      let base = lowerSyllable.slice(0, -1);
      base = base.replace(/u:|v/g, 'ü');
      
      if (tone === '5') {
        return isCapitalized ? base.charAt(0).toUpperCase() + base.slice(1) : base;
      }
      
      let vowelPos = -1;
      const aeMatch = base.search(/[ae]/);
      if (aeMatch !== -1) vowelPos = aeMatch;
      else if (base.includes('ou')) vowelPos = base.indexOf('o');
      else {
        const vowels = base.match(/[aeiouü]/g);
        if (vowels && vowels.length > 0) {
          const lastVowel = vowels[vowels.length - 1];
          vowelPos = base.lastIndexOf(lastVowel);
        }
      }
      
      if (vowelPos === -1) return syllable;
      const vowel = base[vowelPos];
      const tonedVowel = this.toneMarks[vowel + tone] || vowel;
      let result = base.slice(0, vowelPos) + tonedVowel + base.slice(vowelPos + 1);
      if (isCapitalized) result = result.charAt(0).toUpperCase() + result.slice(1);
      return result;
    }
  
    convert(pinyinString) {
      if (!pinyinString) return '';
      const syllables = pinyinString.split(/\s+/);
      return syllables.map(s => this.convertSyllable(s)).join(' ');
    }
  }
  
  const pinyinConverter = new PinyinConverter();
  
  // ========== СЛОВАРЬ CEDICT ==========
  class CEDICT {
    constructor() {
      // Для каждого символа храним массив вариантов
      this.charMap = new Map();
      this.loaded = false;
    }

    // Разбор строки словаря
    parseLine(line) {
      line = line.trim().replace(/^\uFEFF/, '');
      const match = line.match(/^(\S+)\s+(\S+)\s+\[(.+?)\]\s+\/(.+?)(?:\/|$)/);
      if (!match) {
        const altMatch = line.match(/^(\S+)\s+\[(.+?)\]\s+\/(.+?)(?:\/|$)/);
        if (altMatch) {
          const [, traditional, pinyin, meaning] = altMatch;
          return { traditional, simplified: traditional, pinyin, meaning };
        }
        return null;
      }
      const [, traditional, simplified, pinyin, meaning] = match;
      return { traditional, simplified, pinyin, meaning: meaning.split('/')[0] };
    }

    // Загрузка словаря
    async loadFromUrl(url, onProgress) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      const lines = text.split('\n');

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line || line.startsWith('#')) continue;

        const entry = this.parseLine(line);
        if (entry) {
          const chars = entry.simplified.split('');
          const pinyinSyllables = entry.pinyin.split(/\s+/);

          chars.forEach((ch, idx) => {
            if (!this.charMap.has(ch)) this.charMap.set(ch, []);
            this.charMap.get(ch).push({
              word: entry.simplified,          // полное слово
              pinyinArray: pinyinSyllables,    // массив слогов
              meaning: entry.meaning,
            });
          });
        }

        if (onProgress && i % 8000 === 0) await new Promise(r => setTimeout(r, 0));
      }

      this.loaded = true;
      console.log(`Словарь загружен, уникальных символов: ${this.charMap.size}`);
      return this.charMap.size;
    }

    // Получение информации о символе
    getCharInfo(char) {
      const entries = this.charMap.get(char);
      if (!entries || entries.length === 0) return null;

      // Ищем вариант для одиночного символа (пиньинь = один слог)
      const oneCharEntry = entries.find(e => e.pinyin.split(/\s+/).length === 1);
      if (oneCharEntry) return oneCharEntry;

      // Иначе возвращаем первый вариант
      return entries[0];
    }
  }

  // ====================== Функция получения пиньиня ======================
  function getPinyinForCharAtWord(char, word, charIndexInWord) {
    const entries = dict.charMap.get(char);
    if (!entries) return '';

    // ищем запись, где слово совпадает
    const entry = entries.find(e => e.word === word);
    if (entry && entry.pinyinArray[charIndexInWord]) {
      return pinyinConverter.convert(entry.pinyinArray[charIndexInWord]);
    }

    // иначе берём первый вариант первого слога
    return entry ? pinyinConverter.convert(entry.pinyinArray[0]) : '';
  }
  
  // ========== API ПЕРЕВОДА ==========
  class TranslationAPI {
    async translate(text, from = 'zh', to = 'ru') {
      if (!text || !text.trim()) return '';
      try {
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
        const data = await res.json();
        return data.responseData?.translatedText || '';
      } catch (e) {
        console.error(e);
        return '';
      }
    }
  }
  
  // Инициализация
  const dict = new CEDICT();
  const translator = new TranslationAPI();
  
  function splitTextIntoWords(text) {
    const words = [];
    let i = 0;
    while (i < text.length) {
      let found = false;
      for (let len = Math.min(4, text.length - i); len > 0; len--) {
        const segment = text.slice(i, i + len);
        const exists = Array.from(segment).some(ch => dict.charMap.has(ch) && dict.charMap.get(ch).some(e => e.word === segment));
        if (exists) {
          words.push(segment);
          i += len;
          found = true;
          break;
        }
      }
      if (!found) {
        words.push(text[i]);
        i++;
      }
    }
    return words;
  }

  // DOM элементы
  const editorLine = document.getElementById('editorLine');
  const inlineInput = document.getElementById('inlineInput');
  const infoPanel = document.getElementById('infoPanel');
  const fullTranslationEl = document.getElementById('fullTranslation');
  const audioBar = document.getElementById('audioBar');
  const statusMsg = document.getElementById('statusMessage');
  const speakBtn = document.getElementById('speakBtn');
  const speakSlowBtn = document.getElementById('speakSlowBtn');
  const stopBtn = document.getElementById('stopBtn');
  const togglePinyinBtn = document.getElementById('togglePinyinBtn');
  const pinyinToggle = document.getElementById('pinyinToggle');
  const clearBtn = document.getElementById('clearBtn');
  
  let showPinyin = true;
  let isSpeaking = false;
  let writers = new Map();
  let isComposing = false;
  
  function getPinyinForChar(char) {
    const info = dict.getCharInfo(char);
    if (info && info.pinyin) {
      return pinyinConverter.convert(info.pinyin);
    }
    return '';
  }
  
  // Создание иероглифа с HanziWriter (закрашенный, как в оригинале)
  function createHanziWriterChar(char, container) {
    if (!window.HanziWriter) return null;
    
    container.innerHTML = '';
    
    const targetDiv = document.createElement('div');
    targetDiv.style.width = '70px';
    targetDiv.style.height = '70px';
    targetDiv.style.display = 'flex';
    targetDiv.style.alignItems = 'center';
    targetDiv.style.justifyContent = 'center';
    container.appendChild(targetDiv);
    
    // Настройки как в оригинальном коде:
    // showCharacter: true - иероглиф закрашен (показываем готовый)
    // showOutline: true - показываем контур
    const writer = window.HanziWriter.create(targetDiv, char, {
      width: 70,
      height: 70,
      padding: 5,
      showOutline: true,
      showCharacter: true,     // Закрашенный иероглиф
      strokeAnimationSpeed: 0.7,
      delayBetweenStrokes: 200
    });
    
    return writer;
  }
  
  // Анимация при клике
  function animateChar(char, writer) {
    if (writer) {
      writer.animateCharacter();
    }
  }
  
  // Создание элемента для обычного текста
  function createPlainTextElement(text) {
    const span = document.createElement('span');
    span.className = 'plain-text';
    span.textContent = text;
    return span;
  }
  
  // Создание элемента для иероглифа
  function createCharElement(char, word, indexInWord) {
    const container = document.createElement('div');
    container.className = 'char-container';
    container.setAttribute('data-char', char);

    const hwTarget = document.createElement('div');
    hwTarget.className = 'hw-target';

    const pinyinSpan = document.createElement('div');
    pinyinSpan.className = 'char-pinyin';
    const pinyin = getPinyinForCharAtWord(char, word, indexInWord);
    pinyinSpan.textContent = pinyin || char;
    if (!showPinyin) pinyinSpan.classList.add('hidden');

    container.appendChild(hwTarget);
    container.appendChild(pinyinSpan);

    const writer = createHanziWriterChar(char, hwTarget);
    if (writer) {
      writers.set(char + '_' + Math.random(), { writer, container });
    }

    container.addEventListener('click', () => {
      if (writer) writer.animateCharacter();
    });

    return container;
  }
  
  // Разбор строки на сегменты (текст и иероглифы)
  function parseTextIntoNodes(text) {
    const nodes = [];
    let currentText = '';
    
    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const isChinese = /[\u4e00-\u9fff\u3400-\u4dbf]/.test(char);
      
      if (isChinese) {
        if (currentText) {
          nodes.push({ type: 'text', content: currentText });
          currentText = '';
        }
        nodes.push({ type: 'char', content: char });
      } else {
        currentText += char;
      }
    }
    
    if (currentText) {
      nodes.push({ type: 'text', content: currentText });
    }
    
    return nodes;
  }
  
  // Обновление всего содержимого редактора
  function updateEditorContent() {
    const inputValue = inlineInput.value;
    if (!inputValue) return;

    const fragment = document.createDocumentFragment();
    const words = splitTextIntoWords(inputValue);

    words.forEach(word => {
      Array.from(word).forEach((char, idx) => {
        if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(char)) {
          fragment.appendChild(createCharElement(char, word, idx));
        } else {
          fragment.appendChild(createPlainTextElement(char));
        }
      });
    });

    editorLine.insertBefore(fragment, inlineInput);
    inlineInput.value = '';
    updateInfoPanel();
    inlineInput.focus();
  }
  
  // Получение всего текста из редактора
  function getAllText() {
    let text = '';
    const children = editorLine.children;
    for (let child of children) {
      if (child.classList && child.classList.contains('char-container')) {
        text += child.getAttribute('data-char') || '';
      } else if (child.classList && child.classList.contains('plain-text')) {
        text += child.textContent || '';
      }
    }
    return text;
  }
  
  // Обновление информационной панели
  async function updateInfoPanel() {
    const text = getAllText();
    if (!text || text.trim() === '') {
      infoPanel.style.display = 'none';
      audioBar.style.display = 'none';
      return;
    }

    const words = splitTextIntoWords(text);
    const pinyinArray = [];

    words.forEach(word => {
      Array.from(word).forEach((char, idx) => {
        if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(char)) {
          const p = getPinyinForCharAtWord(char, word, idx);
          pinyinArray.push(p || char);
        } else {
          pinyinArray.push(char);
        }
      });
    });

    const translation = await translator.translate(text);
    fullTranslationEl.textContent = translation || '— перевод не найден —';

    infoPanel.style.display = 'block';
    audioBar.style.display = 'flex';
    speakBtn.disabled = false;
    speakSlowBtn.disabled = false;
    stopBtn.disabled = true;
  }
  
  // Обновление видимости пиньиня (абсолютное позиционирование, не влияет на layout)
  function updatePinyinVisibility() {
    document.querySelectorAll('.char-pinyin').forEach(el => {
      if (showPinyin) {
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    });
  }
  
  // Обработчик ввода
  function handleInput(e) {
      // Если идёт ввод через IME (китайская клавиатура), не обрабатываем
      if (isComposing) return;
      
      const value = e.target.value;
      if (value) {
          updateEditorContent();
      }
  }
  
  // Обработчик нажатия клавиш
  function handleKeyDown(e) {
    if (e.key === 'Backspace' && inlineInput.value === '') {
      const children = editorLine.children;
      let lastElement = null;
      for (let i = children.length - 1; i >= 0; i--) {
        const child = children[i];
        if (child !== inlineInput && 
            (child.classList?.contains('char-container') || 
             child.classList?.contains('plain-text'))) {
          lastElement = child;
          break;
        }
      }
      if (lastElement) {
        if (lastElement.classList.contains('char-container')) {
          const char = lastElement.getAttribute('data-char');
          writers.delete(char);
        }
        lastElement.remove();
        updateInfoPanel();
        e.preventDefault();
      }
    }
    
    if (e.key === 'Enter') {
      e.preventDefault();
      updateEditorContent();
    }
  }
  
  // Очистка всего
  function clearAll() {
    const children = [...editorLine.children];
    for (let child of children) {
      if (child !== inlineInput) {
        if (child.classList && child.classList.contains('char-container')) {
          const char = child.getAttribute('data-char');
          writers.delete(char);
        }
        child.remove();
      }
    }
    updateInfoPanel();
    inlineInput.focus();
  }
  
  // Аудио функции
  function speakText(text, rate = 1) {
    if (!window.speechSynthesis || !text || isSpeaking) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = rate;
    utterance.onstart = () => {
      isSpeaking = true;
      speakBtn.disabled = true;
      speakSlowBtn.disabled = true;
      stopBtn.disabled = false;
    };
    utterance.onend = () => {
      isSpeaking = false;
      speakBtn.disabled = false;
      speakSlowBtn.disabled = false;
      stopBtn.disabled = true;
    };
    utterance.onerror = () => {
      isSpeaking = false;
      speakBtn.disabled = false;
      speakSlowBtn.disabled = false;
      stopBtn.disabled = true;
    };
    window.speechSynthesis.speak(utterance);
  }
  
  function stopSpeaking() {
    if (isSpeaking) {
      window.speechSynthesis.cancel();
      isSpeaking = false;
      speakBtn.disabled = false;
      speakSlowBtn.disabled = false;
      stopBtn.disabled = true;
    }
  }
  
  // Обработчики событий
  inlineInput.addEventListener('input', handleInput);
  inlineInput.addEventListener('keydown', handleKeyDown);
  clearBtn.addEventListener('click', clearAll);
  inlineInput.addEventListener('compositionstart', () => {
    isComposing = true;
});
  togglePinyinBtn.addEventListener('click', () => {
    showPinyin = !showPinyin;
    if (showPinyin) pinyinToggle.classList.add('active');
    else pinyinToggle.classList.remove('active');
    updatePinyinVisibility();
  });
  inlineInput.addEventListener('compositionend', (e) => {
    isComposing = false;
    const value = e.target.value;
    if (value) {
        updateEditorContent();
    }
});
  speakBtn.addEventListener('click', () => speakText(getAllText(), 1));
  speakSlowBtn.addEventListener('click', () => speakText(getAllText(), 0.7));
  stopBtn.addEventListener('click', stopSpeaking);
  
  // Автозагрузка словаря
  async function autoLoadDict() {
    try {
      await dict.loadFromUrl('https://cdn.jsdelivr.net/gh/Axmer4ik/chinese-dictionary@main/cedict.u8');
      statusMsg.innerHTML = '✅ Словарь готов';
      statusMsg.style.background = '#e6f7e6';
      setTimeout(() => { statusMsg.style.display = 'none'; }, 1800);
      inlineInput.focus();
    } catch (e) {
      console.error(e);
      statusMsg.innerHTML = '⚠️ Ошибка загрузки словаря';
      statusMsg.style.background = '#ffe6e6';
    }
  }
  
  function waitForLib() {
    if (window.HanziWriter) autoLoadDict();
    else setTimeout(waitForLib, 150);
  }
  waitForLib();
</script>
</body>
